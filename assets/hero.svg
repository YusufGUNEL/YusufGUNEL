<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#818CF8;#F472B6;#22D3EE" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#818CF8">
        <animate attributeName="stop-color" values="#818CF8;#F472B6;#22D3EE;#818CF8" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F472B6">
        <animate attributeName="stop-color" values="#F472B6;#22D3EE;#818CF8;#F472B6" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glowL" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#30363D" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1000" height="300" rx="16" fill="#0D1117"/>
  <rect width="1000" height="300" rx="16" fill="url(#dots)"/>
  <rect width="1000" height="300" rx="16" fill="url(#glowL)"/>
  <rect width="1000" height="300" rx="16" fill="url(#glowR)"/>
  <rect x="0.75" y="0.75" width="998.5" height="298.5" rx="15.25" stroke="#30363D" stroke-width="1.5"/>

  <!-- left neural cluster -->
  <g stroke="#22D3EE" stroke-width="1" opacity="0.35">
    <g stroke-dasharray="4 7">
      <line x1="60" y1="70" x2="150" y2="50"/>
      <line x1="60" y1="70" x2="100" y2="150"/>
      <line x1="150" y1="50" x2="215" y2="105"/>
      <line x1="100" y1="150" x2="215" y2="105"/>
      <line x1="100" y1="150" x2="70" y2="235"/>
      <line x1="100" y1="150" x2="180" y2="200"/>
      <line x1="215" y1="105" x2="180" y2="200"/>
      <line x1="180" y1="200" x2="255" y2="240"/>
      <line x1="70" y1="235" x2="180" y2="200"/>
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="5s" repeatCount="indefinite"/>
    </g>
  </g>
  <g fill="#22D3EE">
    <circle cx="60" cy="70" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="50" r="3" fill="#818CF8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cx="215" cy="105" r="4" fill="#F472B6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-2s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="150" r="4.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-0.5s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="235" r="3" fill="#818CF8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-1.5s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="200" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-2.5s" repeatCount="indefinite"/></circle>
    <circle cx="255" cy="240" r="3" fill="#F472B6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-0.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- right neural cluster (mirror) -->
  <g stroke="#818CF8" stroke-width="1" opacity="0.35">
    <g stroke-dasharray="4 7">
      <line x1="940" y1="70" x2="850" y2="50"/>
      <line x1="940" y1="70" x2="900" y2="150"/>
      <line x1="850" y1="50" x2="785" y2="105"/>
      <line x1="900" y1="150" x2="785" y2="105"/>
      <line x1="900" y1="150" x2="930" y2="235"/>
      <line x1="900" y1="150" x2="820" y2="200"/>
      <line x1="785" y1="105" x2="820" y2="200"/>
      <line x1="820" y1="200" x2="745" y2="240"/>
      <line x1="930" y1="235" x2="820" y2="200"/>
      <animate attributeName="stroke-dashoffset" from="0" to="66" dur="5s" repeatCount="indefinite"/>
    </g>
  </g>
  <g fill="#818CF8">
    <circle cx="940" cy="70" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-2s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="50" r="3" fill="#F472B6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="785" cy="105" r="4" fill="#22D3EE"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="150" r="4.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-1.8s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="235" r="3" fill="#22D3EE"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-0.4s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="200" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-2.2s" repeatCount="indefinite"/></circle>
    <circle cx="745" cy="240" r="3" fill="#F472B6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="-1.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- name -->
  <text x="500" y="140" text-anchor="middle" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="6" fill="url(#nameGrad)">YUSUF GÜNEL</text>
  <text x="500" y="180" text-anchor="middle" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="8" fill="#8B949E">AI &amp; MACHINE LEARNING ENGINEER</text>

  <!-- cycling focus line -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="16" text-anchor="middle">
    <text x="500" y="228" fill="#22D3EE" opacity="0">
      &gt; natural language processing_
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="228" fill="#818CF8" opacity="0">
      &gt; computer vision systems_
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="12s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="228" fill="#F472B6" opacity="0">
      &gt; deep learning models_
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="12s" begin="6s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="228" fill="#34D399" opacity="0">
      &gt; AI-native mobile apps_
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="12s" begin="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- animated underline -->
  <rect x="380" y="252" width="240" height="3" rx="1.5" fill="url(#nameGrad)">
    <animate attributeName="x" values="380;350;380" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="width" values="240;300;240" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
