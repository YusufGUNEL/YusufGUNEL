<svg width="440" height="200" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#30363D"/>
      <stop offset="1" stop-color="#60A5FA"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="gl" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#0D1117"/>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="url(#gl)"/>
  <rect x="1" y="1" width="438" height="198" rx="14" stroke="url(#bd)" stroke-width="1.6"/>

  <text x="26" y="44" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#E6EDF3">✈️  Travel Orchestration</text>
  <text x="26" y="68" font-family="Consolas, 'Courier New', monospace" font-size="12.5" font-weight="600" fill="#60A5FA" letter-spacing="1">MICROSERVICES · RESILIENT APIS</text>
  <rect x="26" y="78" width="52" height="2.5" rx="1.25" fill="#60A5FA">
    <animate attributeName="width" values="52;110;52" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="26" y="106" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">Distributed booking system with Circuit Breaker patterns</text>
  <text x="26" y="126" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">and composite endpoints — NestJS microservices on Docker.</text>

  <g><rect x="26" y="152" width="65" height="26" rx="13" fill="#60A5FA" fill-opacity="0.10" stroke="#60A5FA" stroke-opacity="0.45"/><text x="58.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#60A5FA">NestJS</text></g>
  <g><rect x="101" y="152" width="65" height="26" rx="13" fill="#60A5FA" fill-opacity="0.10" stroke="#60A5FA" stroke-opacity="0.45"/><text x="133.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#60A5FA">Docker</text></g>
  <g><rect x="176" y="152" width="115" height="26" rx="13" fill="#60A5FA" fill-opacity="0.10" stroke="#60A5FA" stroke-opacity="0.45"/><text x="233.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#60A5FA">Microservices</text></g>
  <g><circle cx="382" cy="58" r="26" stroke="#60A5FA" stroke-opacity="0.35" stroke-dasharray="5 6" fill="none"><animateTransform attributeName="transform" type="rotate" from="0 382 58" to="360 382 58" dur="10s" repeatCount="indefinite"/></circle><circle cx="382" cy="58" r="7" fill="#60A5FA" fill-opacity="0.3" stroke="#60A5FA" stroke-width="2"/><circle cx="408" cy="58" r="4" fill="#60A5FA"><animateTransform attributeName="transform" type="rotate" from="0 382 58" to="360 382 58" dur="5s" repeatCount="indefinite"/></circle></g>
</svg>
