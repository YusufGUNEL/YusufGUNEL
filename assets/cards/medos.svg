<svg width="440" height="200" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="0.5" stop-color="#30363D"/>
      <stop offset="1" stop-color="#F472B6"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="gl" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#0D1117"/>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="url(#gl)"/>
  <rect x="1" y="1" width="438" height="198" rx="14" stroke="url(#bd)" stroke-width="1.6"/>

  <rect x="26" y="30" width="4" height="18" rx="2" fill="#F472B6"/>
  <text x="40" y="45" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#E6EDF3">MedOS Stroke Detection</text>
  <text x="26" y="68" font-family="Consolas, 'Courier New', monospace" font-size="12.5" font-weight="600" fill="#F472B6" letter-spacing="1">MEDICAL AI · NEURO-DIAGNOSTICS</text>
  <rect x="26" y="78" width="52" height="2.5" rx="1.25" fill="#F472B6">
    <animate attributeName="width" values="52;110;52" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="26" y="106" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">Deep learning system detecting stroke from brain imaging,</text>
  <text x="26" y="126" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">wrapped in a clinical-style diagnostic interface.</text>

  <g><rect x="26" y="152" width="115" height="26" rx="13" fill="#F472B6" fill-opacity="0.10" stroke="#F472B6" stroke-opacity="0.45"/><text x="83.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#F472B6">Deep Learning</text></g>
  <g><rect x="151" y="152" width="36" height="26" rx="13" fill="#F472B6" fill-opacity="0.10" stroke="#F472B6" stroke-opacity="0.45"/><text x="169.0" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#F472B6">CV</text></g>
  <g><rect x="197" y="152" width="94" height="26" rx="13" fill="#F472B6" fill-opacity="0.10" stroke="#F472B6" stroke-opacity="0.45"/><text x="244.0" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#F472B6">Healthcare</text></g>
  <path d="M330 58 h18 l7 -16 l12 32 l9 -22 l6 6 h28" stroke="#F472B6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="130" stroke-dashoffset="130"><animate attributeName="stroke-dashoffset" values="130;0;0;-130" keyTimes="0;0.4;0.7;1" dur="3s" repeatCount="indefinite"/></path>
