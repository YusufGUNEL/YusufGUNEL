  <g><rect x="108" y="152" width="86" height="26" rx="13" fill="#818CF8" fill-opacity="0.10" stroke="#818CF8" stroke-opacity="0.45"/><text x="151.0" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#818CF8">Gemini AI</text></g>
