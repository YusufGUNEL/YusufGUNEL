<svg width="440" height="200" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.5" stop-color="#30363D"/>
      <stop offset="1" stop-color="#FBBF24"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="gl" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#0D1117"/>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="url(#gl)"/>
  <rect x="1" y="1" width="438" height="198" rx="14" stroke="url(#bd)" stroke-width="1.6"/>

  <text x="26" y="44" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#E6EDF3">👁️  OfficeGuardian</text>
  <text x="26" y="68" font-family="Consolas, 'Courier New', monospace" font-size="12.5" font-weight="600" fill="#FBBF24" letter-spacing="1">REAL-TIME CV · WORKPLACE HEALTH</text>
  <rect x="26" y="78" width="52" height="2.5" rx="1.25" fill="#FBBF24">
    <animate attributeName="width" values="52;110;52" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="26" y="106" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">Posture and attention analysis through a standard webcam —</text>
  <text x="26" y="126" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">no wearable sensors, role-based health dashboards.</text>

  <g><rect x="26" y="152" width="65" height="26" rx="13" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.45"/><text x="58.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#FBBF24">Django</text></g>
  <g><rect x="101" y="152" width="65" height="26" rx="13" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.45"/><text x="133.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#FBBF24">OpenCV</text></g>
  <g><rect x="176" y="152" width="65" height="26" rx="13" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.45"/><text x="208.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#FBBF24">Python</text></g>
  <g><path d="M345 58 q37 -26 74 0 q-37 26 -74 0 Z" stroke="#FBBF24" stroke-width="2" fill="none"/><circle cx="382" cy="58" r="9" fill="#FBBF24" fill-opacity="0.25" stroke="#FBBF24" stroke-width="2"><animate attributeName="cx" values="382;390;374;382" dur="4s" repeatCount="indefinite"/></circle></g>
</svg>
