<svg width="440" height="200" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EF4444"/>
      <stop offset="0.5" stop-color="#30363D"/>
      <stop offset="1" stop-color="#EF4444"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="gl" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#0D1117"/>
  <rect x="1" y="1" width="438" height="198" rx="14" fill="url(#gl)"/>
  <rect x="1" y="1" width="438" height="198" rx="14" stroke="url(#bd)" stroke-width="1.6"/>

  <rect x="26" y="30" width="4" height="18" rx="2" fill="#EF4444"/>
  <text x="40" y="45" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#E6EDF3">TankTespit</text>
  <text x="26" y="68" font-family="Consolas, 'Courier New', monospace" font-size="12.5" font-weight="600" fill="#EF4444" letter-spacing="1">OBJECT DETECTION · YOLOV8</text>
  <rect x="26" y="78" width="52" height="2.5" rx="1.25" fill="#EF4444">
    <animate attributeName="width" values="52;110;52" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="26" y="106" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">Military vehicle detection trained on a custom dataset —</text>
  <text x="26" y="126" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="13.5" fill="#8B949E">end-to-end YOLOv8 data prep and training pipeline.</text>

  <g><rect x="26" y="152" width="65" height="26" rx="13" fill="#EF4444" fill-opacity="0.10" stroke="#EF4444" stroke-opacity="0.45"/><text x="58.5" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#EF4444">YOLOv8</text></g>
  <g><rect x="101" y="152" width="72" height="26" rx="13" fill="#EF4444" fill-opacity="0.10" stroke="#EF4444" stroke-opacity="0.45"/><text x="137.0" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#EF4444">PyTorch</text></g>
  <g><rect x="183" y="152" width="36" height="26" rx="13" fill="#EF4444" fill-opacity="0.10" stroke="#EF4444" stroke-opacity="0.45"/><text x="201.0" y="169" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#EF4444">CV</text></g>
  <g opacity="0.8"><circle cx="382" cy="58" r="30" stroke="#EF4444" stroke-opacity="0.3" fill="none"/><circle cx="382" cy="58" r="19" stroke="#EF4444" stroke-opacity="0.3" fill="none"/><circle cx="382" cy="58" r="8" stroke="#EF4444" stroke-opacity="0.3" fill="none"/><line x1="382" y1="58" x2="382" y2="28" stroke="#EF4444" stroke-width="2"><animateTransform attributeName="transform" type="rotate" from="0 382 58" to="360 382 58" dur="4s" repeatCount="indefinite"/></line><circle cx="395" cy="45" r="3" fill="#EF4444"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle></g>
