name: Generate Snake Animation

"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: YusufGUNEL
          outputs: github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#7C83FD&color_dots=#0d1117,#1a1a2e,#302b63,#7C83FD,#a78bfa

      - name: Commit snake to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake animation"
          file_pattern: "github-contribution-grid-snake-dark.svg"
